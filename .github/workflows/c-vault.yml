name: C Vault CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsodium-dev
      - name: Build and Test C Library
        run: |
          mkdir build && cd build
          cmake ..
          make
          ./test_vault
