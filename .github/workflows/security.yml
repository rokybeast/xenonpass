name: Security Scans

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  rust-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Rust dependencies
        uses: EmbarkStudios/cargo-deny-action@v1

  go-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26.x'
