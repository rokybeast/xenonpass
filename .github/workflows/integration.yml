name: Integration Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          
      - name: Setup Bun (Frontend Caching)
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsodium-dev
        
      - name: Build C Library
        run: |
          mkdir build && cd build
          cmake ..
          make
          
      - name: Verify Linkage and Compile Go
        run: |
          export CGO_CFLAGS="-I${GITHUB_WORKSPACE}/src/vault/include"
          export CGO_LDFLAGS="-L${GITHUB_WORKSPACE}/build -lxpass"
          export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/build"
          go build -v ./...
